loader: taskgraph.loader.transform:loader
transforms:
  - code_coverage_taskgraph.transforms.build
  - taskgraph.transforms.task
kind-dependencies:
  - lint
  - test
tasks:
  bot:
    description: Build docker image with taskboot
    attributes:
      run-on-tasks-for:
        - github-pull-request
        - github-push
    worker-type: b-linux
    worker:
      docker-image: mozilla/taskboot:0.4.1
      max-run-time: 3600
      artifacts:
        - type: file
          name: public/code-coverage-bot.tar.zst
          path: /bot.tar.zst
    dependencies:
      lint: lint-pre-commit
      test: test-bot-unit
